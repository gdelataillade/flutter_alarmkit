name: Publish to pub.dev

# Publishes the package to pub.dev when a version tag (e.g. v0.1.0) is pushed.
#
# Prerequisite (one-time): enable automated publishing for this package on
# pub.dev — Admin tab > "Automated publishing" > enable publishing from GitHub
# Actions, set the repository to "gdelataillade/flutter_alarmkit" and the tag
# pattern to "v{{version}}". Authentication then uses GitHub OIDC, so no tokens
# or secrets need to be stored.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC authentication with pub.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Sets up Dart AND configures the temporary pub.dev OIDC credential. This
      # step is what authenticates the publish — without it, `dart pub publish`
      # falls back to an interactive Google login that cannot run in CI.
      - name: Set up Dart (configures pub.dev OIDC credentials)
        uses: dart-lang/setup-dart@v1

      # Flutter SDK, needed so `dart pub publish` can resolve this plugin's
      # `flutter:` SDK dependency. Set up after Dart so Flutter's bundled `dart`
      # is the one on PATH while setup-dart's credential remains in place.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      # Gate the publish: a tag on a commit that doesn't analyze cleanly or
      # pass the unit tests must not reach pub.dev.
      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Publish
        run: dart pub publish --force
